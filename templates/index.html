<!DOCTYPE html>
<html>
<head>
    <title>Cloud Storage</title>
</head>
<body>

    <h2>Upload File</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file">
        <button type="submit">Upload</button>
    </form>

    <h2>Uploaded Files</h2>

    <ul>
        {% for file in files %}
            <li>
                {% if file.pinned %}
                    ⭐
                {% endif %}

                <a href="/download/{{ file.stored_name }}">
                    {{ file.original_name }}
                </a>
                |
                <a href="/delete/{{ file.stored_name }}">Delete</a>
                |
                <a href="/share/{{ file.share_token }}">Share</a>
                |
                <a href="/pin/{{ file.stored_name }}">
                    {% if file.pinned %}Unpin{% else %}Pin{% endif %}
                </a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
